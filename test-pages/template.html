<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canoe Lake</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="fragment"> <!-- change to chapter when needed -->

<div class="container">
  <div class="title" id="title">FRAGMENT 01</div> <!-- change number -->
  <div class="subtitle" id="subtitle">Audio Evidence</div> <!-- change for chapters -->

  <!-- IMAGE -->
  <img id="cardImage" src="assets/fragments/fragment01.jpg" alt="Card Image">

  <!-- AUDIO -->
  <audio id="audio">
    <source id="audioSource" src="assets/fragments/fragment01.mp3" type="audio/mpeg"> <!-- change source for chapters -->
  </audio>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="playBtn">PLAY</button>
    <button id="pauseBtn">PAUSE</button>
    <button id="replayBtn">REPLAY</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
